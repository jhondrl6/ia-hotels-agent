# IA Hoteles Agent - Pre-commit Configuration
# v4.0.0 - Sistema de Confianza
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # === PYTHON CODE QUALITY ===
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        language_version: python3.13
        args: [--line-length=100]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

  # === LOCAL VALIDATIONS v4.0 ===
  - repo: local
    hooks:
      # Run all v4.0 tests
      - id: pytest-v4
        name: pytest v4.0 (all modules)
        entry: python -m pytest tests/data_validation tests/financial_engine tests/orchestration_v4 tests/asset_generation -q --tb=short
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true

      # Check for residual files
      - id: structure-guard
        name: Structure Guard (residual files)
        entry: python scripts/structure_guard.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true

      # Validate Plan Maestro coherence
      - id: validate-plan
        name: Validate Plan Maestro
        entry: python scripts/run_all_validations.py --check
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true

      # NEW v4.0: Validate data validation module imports
      - id: validate-data-validation
        name: Validate Data Validation Module
        entry: >-
          python -c "from modules.data_validation import CrossValidator, ConfidenceLevel, DataPoint; print('Data Validation: OK')"
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true

      # NEW v4.0: Validate financial engine imports
      - id: validate-financial-engine
        name: Validate Financial Engine Module
        entry: >-
          python -c "from modules.financial_engine import ScenarioCalculator, HotelFinancialData, FormulaTransparency; print('Financial Engine: OK')"
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true

      # NEW v4.0: Validate orchestration imports
      - id: validate-orchestration
        name: Validate Orchestration Module
        entry: >-
          python -c "from modules.orchestration_v4 import OnboardingController, TwoPhaseOrchestrator; print('Orchestration: OK')"
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true

      # NEW v4.0: Validate asset generation imports
      - id: validate-asset-generation
        name: Validate Asset Generation Module
        entry: >-
          python -c "from modules.asset_generation import ConditionalGenerator, PreflightChecker; print('Asset Generation: OK')"
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true

      # NEW v4.0: Check v4.0 module structure
      - id: check-v4-structure
        name: Check v4.0 Module Structure
        entry: >-
          python -c "import sys; from pathlib import Path; required_modules = ['modules/data_validation/__init__.py', 'modules/data_validation/confidence_taxonomy.py', 'modules/data_validation/cross_validator.py', 'modules/financial_engine/__init__.py', 'modules/financial_engine/scenario_calculator.py', 'modules/orchestration_v4/__init__.py', 'modules/orchestration_v4/two_phase_flow.py', 'modules/asset_generation/__init__.py', 'modules/asset_generation/preflight_checks.py']; missing = [m for m in required_modules if not Path(m).exists()]; sys.exit(1) if missing else print('v4.0 Structure: OK')"
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true

# === CI CONFIGURATION ===
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks
    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
