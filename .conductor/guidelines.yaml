# IA Hoteles Guideline Enforcement
# v2.6.5 Content Standards - Sesión 5: Unidades decimal/x normalizadas

v4_coherence_rules:
  whatsapp_verified:
    confidence_threshold: 0.9
    blocking: true
    description: "WhatsApp debe estar verificado cruzando 2+ fuentes"
  
  financial_data_validated:
    confidence_threshold: 0.7
    blocking: false
    description: "Datos financieros deben tener confianza >= 0.7"
  
  problems_have_solutions:
    confidence_threshold: 0.5
    blocking: true
    description: "Al menos 50% de problemas deben tener solución"
  
  assets_are_justified:
    confidence_threshold: 0.8
    blocking: false
    description: "Assets deben estar justificados por problemas"
  
  overall_coherence:
    confidence_threshold: 0.8
    blocking: false
    description: "Score de coherencia global debe ser >= 0.8"

# NOTA SOBRE UNIDADES (Sesión 5 - M-001):
# - Los valores _x son notación legible para humanos (ej: 3.0 = 3.0x)
# - El sistema convierte automáticamente a decimal interno (0.03 = 3%)
# - Los mensajes al usuario muestran notación x para legibilidad
price_validation:
  # Notación x para legibilidad (ej: 3.0x = 3% del dolor)
  min_ratio: 3.0    # = 0.03 decimal = 3%
  max_ratio: 6.0    # = 0.06 decimal = 6%
  ideal_ratio: 4.5  # = 0.045 decimal = 4.5%
  
  # Campos explícitos con sufijo _x para claridad
  min_ratio_x: 3.0
  max_ratio_x: 6.0
  ideal_ratio_x: 4.5

  by_tier:
    boutique:
      room_range: [10, 25]
      percentage: 3.0  # 3% of expected loss
      min_price_cop: 1200000
      max_price_cop: 2500000
      pain_ratio_range: [0.025, 0.05]

    standard:
      room_range: [26, 60]
      percentage: 2.5  # 2.5% of expected loss
      min_price_cop: 1800000
      max_price_cop: 3800000
      pain_ratio_range: [0.02, 0.045]

    large:
      room_range: [61, null]  # 61+
      percentage: 2.0  # 2% of expected loss
      min_price_cop: 3500000
      max_price_cop: 7500000
      pain_ratio_range: [0.015, 0.04]

  gate_thresholds:
    min_pain_ratio: 0.03  # 3% - decimal
    max_pain_ratio: 0.06  # 6% - decimal
    ideal_pain_ratio: 0.045  # 4.5% - decimal

rules:
  - id: geo-content-style
    description: "Asegurar que el contenido generado siga el estándar GEO"
    pattern: "first_paragraph"
    max_words: 40
    message: "El primer párrafo de contenido GEO no debe exceder las 40 palabras."

  - id: forbidden-words
    description: "Eliminar jerga de IA genérica"
    forbidden:
      - "delve"
      - "comprehensive"
      - "in today's landscape"
      - "integral"
      - "profundicemos"
    message: "Palabra prohibida detectada. Favor de usar lenguaje directo y natural."

  - id: security-api-keys
    description: "Prevenir fugas de secretos"
    pattern: "(DEEPSEEK_API_KEY|ANTHROPIC_API_KEY|GOOGLE_PAGESPEED_API_KEY)"
    message: "No se permite el hardcoding de llaves API. Use variables de entorno."
